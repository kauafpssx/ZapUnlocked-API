name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmagic1 ffmpeg

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Check imports (startup smoke test)
        run: |
          ENABLE_WHATSAPP=0 python -c "
          import sys, os
          os.environ['ENABLE_WHATSAPP'] = '0'
          os.environ['API_KEY'] = 'ci-test-key'
          os.environ['INTERNAL_SECRET'] = 'ci-test-secret'
          from src.app import create_app
          app = create_app()
          print('✓ App imports OK')
          "

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t zapunlocked:ci .

      - name: Smoke test container
        run: |
          docker run -d --name zaptest \
            -e API_KEY=ci-test-key \
            -e INTERNAL_SECRET=ci-test-secret \
            -e ENABLE_WHATSAPP=0 \
            -p 8300:8300 \
            zapunlocked:ci
          sleep 10
          curl -f http://localhost:8300/status || (docker logs zaptest && exit 1)
          docker stop zaptest
